name: Release plugin

# Tag-driven release: pushing a tag like v1.0.0.0 builds the plugin, packages it
# as a .zip, uploads the .zip as a GitHub Release asset, and appends a new
# version entry to manifest.json on main so the Jellyfin plugin catalog sees it.
#
# Tag format is four-segment (v1.0.0.0) to match Jellyfin's AssemblyVersion
# convention and what Jellyfin stores in PluginManifest.Version.

on:
  push:
    tags:
      - "v*.*.*.*"

permissions:
  contents: write  # required to create releases and push the manifest update

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we push manifest.json back to main at the end

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Derive version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Building for version ${VERSION}"

      - name: Build plugin (Release)
        run: |
          dotnet build Jellyfin.Plugin.AgeRating.sln \
            -c Release \
            /p:Version=${{ steps.version.outputs.version }} \
            /property:GenerateFullPaths=true \
            /consoleloggerparameters:NoSummary

      - name: Package plugin as .zip
        id: package
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DLL="Jellyfin.Plugin.AgeRating/bin/Release/net9.0/Jellyfin.Plugin.AgeRating.dll"
          ZIP="Jellyfin.Plugin.AgeRating_${VERSION}.zip"
          # Jellyfin extracts the zip flat into a new dir it names itself, so we
          # don't need to wrap the DLL in a subdirectory. Keep it lean.
          (cd "$(dirname "$DLL")" && zip -j "$GITHUB_WORKSPACE/$ZIP" "$(basename "$DLL")")
          CHECKSUM=$(md5sum "$ZIP" | awk '{print $1}' | tr 'A-Z' 'a-z')
          SIZE=$(stat -c%s "$ZIP")
          echo "zip=${ZIP}" >> "$GITHUB_OUTPUT"
          echo "checksum=${CHECKSUM}" >> "$GITHUB_OUTPUT"
          echo "size=${SIZE}" >> "$GITHUB_OUTPUT"
          echo "Built $ZIP ($SIZE bytes) — MD5 $CHECKSUM"

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update manifest.json
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CHECKSUM="${{ steps.package.outputs.checksum }}"
          ZIP="${{ steps.package.outputs.zip }}"
          REPO="${GITHUB_REPOSITORY}"
          SOURCE_URL="https://github.com/${REPO}/releases/download/${GITHUB_REF_NAME}/${ZIP}"
          TIMESTAMP="$(date -u +%Y-%m-%dT%H:%M:%SZ)"

          # Read targetAbi out of build.yaml so it stays in sync with the plugin's declared ABI.
          TARGET_ABI=$(grep -E '^targetAbi:' build.yaml | sed -E 's/.*"([^"]+)".*/\1/')
          CHANGELOG="See release notes at https://github.com/${REPO}/releases/tag/${GITHUB_REF_NAME}"

          # Prepend the new version so newest is first (matches the Jellyfin official catalog).
          jq --arg v "$VERSION" \
             --arg cl "$CHANGELOG" \
             --arg abi "$TARGET_ABI" \
             --arg src "$SOURCE_URL" \
             --arg sum "$CHECKSUM" \
             --arg ts "$TIMESTAMP" \
             '.[0].versions = ([{
                version: $v,
                changelog: $cl,
                targetAbi: $abi,
                sourceUrl: $src,
                checksum: $sum,
                timestamp: $ts
             }] + .[0].versions)' \
             manifest.json > manifest.json.new
          mv manifest.json.new manifest.json

          echo "Updated manifest.json:"
          jq '.[0].versions[0]' manifest.json

      - name: Commit updated manifest.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          if git diff --cached --quiet; then
            echo "No manifest changes to commit."
            exit 0
          fi
          git commit -m "Release ${{ github.ref_name }}: append to manifest.json"
          # Push to the default branch; assumes main allows Actions pushes.
          git push origin HEAD:${{ github.event.repository.default_branch }}
