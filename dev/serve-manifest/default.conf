server {
    listen 80 default_server;
    root /srv;
    autoindex on;

    # Allow Jellyfin's admin UI (running on a different origin) to probe the
    # manifest across origins without CORS grief during development.
    add_header 'Access-Control-Allow-Origin' '*' always;
    add_header 'Access-Control-Allow-Methods' 'GET, HEAD, OPTIONS' always;

    # Serve the manifest with application/json so Jellyfin's deserializer is happy.
    location = /manifest.json {
        default_type application/json;
        try_files $uri =404;
    }

    # Zip downloads.
    location ~* \.zip$ {
        default_type application/zip;
        try_files $uri =404;
    }
}
